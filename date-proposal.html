<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will you go on a date with me?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Nunito:wght@400;600;700;800&display=swap');

  :root{
    --pink-deep: #c14e73;
    --pink-mid: #d1618a;
    --pink-soft: #f7d9e3;
    --pink-bg1: #fdf1f4;
    --pink-bg2: #fbe4ec;
    --ink: #7a3550;
    --card-bg: rgba(255,255,255,0.72);
  }

  *{ box-sizing: border-box; }

  html,body{
    height:100%;
    margin:0;
    font-family:'Nunito', sans-serif;
    color: var(--ink);
    overflow:hidden;
  }

  body{
    background: radial-gradient(circle at 20% 15%, var(--pink-bg2), var(--pink-bg1) 60%);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  /* floating background petals */
  .petal{
    position:fixed;
    top:-40px;
    font-size: 22px;
    opacity:0.55;
    animation: fall linear infinite;
    pointer-events:none;
    user-select:none;
  }
  @keyframes fall{
    0%{ transform: translateY(-10vh) rotate(0deg); }
    100%{ transform: translateY(110vh) rotate(360deg); }
  }

  .stage{
    position:relative;
    width: 420px;
    max-width: 92vw;
  }

  .card{
    background: var(--card-bg);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 28px;
    padding: 40px 34px 34px;
    box-shadow: 0 25px 60px -20px rgba(193, 78, 115, 0.35), 0 2px 8px rgba(193,78,115,0.15);
    position:relative;
    display:none;
    animation: rise 0.5s cubic-bezier(.2,.9,.25,1) both;
  }
  .card.active{ display:block; }

  @keyframes rise{
    from{ opacity:0; transform: translateY(24px) scale(0.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size: 28px;
    text-align:center;
    color: var(--pink-deep);
    margin: 0 0 26px;
    line-height:1.3;
  }
  h1 .flower{ font-size: 22px; }

  /* ---------- Screen 1 : Yes/No ---------- */
  #screen1 .buttons-row{
    display:flex;
    justify-content:center;
    margin-top: 6px;
  }
  .btn-yes{
    width:100%;
    padding: 16px;
    border:none;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
    color:#fff;
    font-family:'Nunito', sans-serif;
    font-weight:800;
    font-size: 17px;
    letter-spacing: 0.5px;
    cursor:pointer;
    box-shadow: 0 12px 26px -8px rgba(193,78,115,0.55);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-yes:hover{
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 16px 30px -8px rgba(193,78,115,0.65);
  }
  .btn-yes:active{ transform: translateY(0) scale(0.98); }

  #noBtn{
    position:fixed;
    padding: 8px 14px;
    border:none;
    background:none;
    color:#b98a9c;
    font-family:'Nunito', sans-serif;
    font-size: 14px;
    font-weight:600;
    cursor:pointer;
    transition: top 0.28s ease, left 0.28s ease;
    z-index: 50;
    user-select:none;
  }
  #noRunAway{
    text-align:center;
    font-size: 13px;
    color:#c98aa0;
    margin-top: 14px;
    height: 16px;
  }

  /* ---------- Screen 2 : Date & time ---------- */
  .section-label{
    font-size: 13px;
    font-weight:700;
    color: #a85e79;
    margin-bottom: 10px;
    letter-spacing:0.3px;
  }
  .calendar{
    background: rgba(255,255,255,0.55);
    border-radius: 18px;
    padding: 16px 14px 18px;
    margin-bottom: 22px;
  }
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-weight:800;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .cal-header button{
    background:none;
    border:none;
    color: var(--pink-deep);
    font-size: 16px;
    cursor:pointer;
    padding: 2px 8px;
  }
  .cal-grid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    text-align:center;
    font-size: 13px;
  }
  .cal-grid .dow{
    font-weight:700;
    color:#b98a9c;
    font-size: 11px;
    padding-bottom: 4px;
  }
  .cal-grid .day{
    padding: 7px 0;
    border-radius: 10px;
    cursor:pointer;
    font-weight:600;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .cal-grid .day.empty{ cursor:default; }
  .cal-grid .day:not(.empty):hover{ background: var(--pink-soft); }
  .cal-grid .day.selected{
    background: var(--pink-deep);
    color:#fff;
  }

  .time-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 26px;
  }
  .time-pill{
    padding: 9px 4px;
    border-radius: 999px;
    border: 1.5px solid rgba(193,78,115,0.25);
    background: rgba(255,255,255,0.5);
    font-size: 12.5px;
    font-weight:700;
    color: var(--ink);
    cursor:pointer;
    text-align:center;
    transition: all 0.15s ease;
  }
  .time-pill:hover{ border-color: var(--pink-deep); }
  .time-pill.selected{
    background: var(--pink-deep);
    color:#fff;
    border-color: var(--pink-deep);
  }

  .primary-btn{
    width:100%;
    padding: 15px;
    border:none;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--pink-mid), var(--pink-deep));
    color:#fff;
    font-weight:800;
    font-size: 15.5px;
    cursor:pointer;
    box-shadow: 0 12px 26px -10px rgba(193,78,115,0.55);
    opacity: 0.5;
    pointer-events:none;
    transition: opacity 0.2s ease, transform 0.15s ease;
  }
  .primary-btn.ready{ opacity:1; pointer-events:auto; }
  .primary-btn.ready:hover{ transform: translateY(-2px); }

  /* ---------- Screen 3 : food ---------- */
  .food-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .food-card{
    background: rgba(255,255,255,0.55);
    border: 1.5px solid transparent;
    border-radius: 16px;
    padding: 18px 8px;
    text-align:center;
    cursor:pointer;
    transition: all 0.15s ease;
  }
  .food-card .emoji{ font-size: 30px; display:block; margin-bottom:8px; }
  .food-card .label{ font-weight:700; font-size: 14px; }
  .food-card:hover{ transform: translateY(-2px); border-color: rgba(193,78,115,0.3); }
  .food-card.selected{
    border-color: var(--pink-deep);
    background: var(--pink-soft);
  }

  /* ---------- Screen 4 : confirmation ---------- */
  #screen4 h1{ font-size: 32px; }
  .summary-box{
    background: rgba(255,255,255,0.6);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 22px;
  }
  .summary-row{
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 9px 0;
    font-weight:700;
    font-size: 15.5px;
  }
  .summary-row .ic{ font-size: 18px; }
  .see-you{
    text-align:center;
    font-family:'Playfair Display', serif;
    font-size: 19px;
    color: var(--pink-deep);
    margin-bottom: 18px;
  }
  .footnote{
    text-align:center;
    font-size: 11.5px;
    font-style: italic;
    color: #c497aa;
    line-height:1.5;
  }
</style>
</head>
<body>

<div class="stage">

  <!-- SCREEN 1 -->
  <div class="card active" id="screen1">
    <h1><span class="flower">🌸</span> Will you go on a date with me? <span class="flower">🌸</span></h1>
    <div class="buttons-row">
      <button class="btn-yes" onclick="goTo(2)">YES ♥</button>
    </div>
    <div class="noRunAway" id="noRunAway"></div>
  </div>

  <!-- SCREEN 2 -->
  <div class="card" id="screen2">
    <h1>So... when are you free? <span class="flower">📆🐾</span></h1>
    <div class="section-label">Pick a day</div>
    <div class="calendar">
      <div class="cal-header">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="calTitle">July 2026</span>
        <button onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="section-label">What time?</div>
    <div class="time-grid" id="timeGrid"></div>
    <button class="primary-btn" id="setDateBtn" onclick="goTo(3)">Set the date ♥</button>
  </div>

  <!-- SCREEN 3 -->
  <div class="card" id="screen3">
    <h1>What are we feeling? <span class="flower">🍽️✨</span></h1>
    <div class="food-grid" id="foodGrid"></div>
    <button class="primary-btn" id="nextBtn" onclick="finalize()">Next 💕</button>
  </div>

  <!-- SCREEN 4 -->
  <div class="card" id="screen4">
    <h1>YAY!! 💕</h1>
    <div class="summary-box">
      <div class="summary-row"><span class="ic">📅</span><span id="sumDate">—</span></div>
      <div class="summary-row"><span class="ic">⏰</span><span id="sumTime">—</span></div>
      <div class="summary-row"><span class="ic">🍽️</span><span id="sumFood">—</span></div>
    </div>
    <div class="see-you">I can't wait to see you! 🌹✨</div>
    <div class="footnote">(normal guys send texts, I made a website. I'm not like other guys xx)</div>
  </div>

</div>

<button id="noBtn" onclick="dodgeNo()">NO 😏</button>

<script>
/* ---------------- petals background ---------------- */
const petalEmojis = ['🌸','💕','🌷'];
for(let i=0;i<14;i++){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.left = Math.random()*100 + 'vw';
  p.style.animationDuration = (8 + Math.random()*10) + 's';
  p.style.animationDelay = (Math.random()*10) + 's';
  p.style.fontSize = (14 + Math.random()*14) + 'px';
  document.body.appendChild(p);
}

/* ---------------- screen navigation ---------------- */
function goTo(n){
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('screen'+n).classList.add('active');
  if(n !== 1){
    document.getElementById('noBtn').style.display = 'none';
  }
}

/* ---------------- NO button dodge logic ---------------- */
const noBtn = document.getElementById('noBtn');
const runAwayLines = [
  "nice try 😌", "nuh uh", "not happening", "keep trying though 👀",
  "you can't catch me", "yes is the only option", "try again 😏"
];
let dodgeCount = 0;

function positionNoRandom(){
  const margin = 60;
  const w = window.innerWidth;
  const h = window.innerHeight;
  const x = margin + Math.random() * (w - margin*2 - 100);
  const y = margin + Math.random() * (h - margin*2 - 40);
  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
}

function dodgeNo(){
  dodgeCount++;
  positionNoRandom();
  const line = document.getElementById('noRunAway');
  line.textContent = runAwayLines[Math.min(dodgeCount-1, runAwayLines.length-1)];
}

// also dodge on hover/approach for extra fun
noBtn.addEventListener('mouseenter', dodgeNo);

// initial placement once layout is ready
window.addEventListener('load', () => {
  noBtn.style.position = 'fixed';
  positionNoRandom();
});
window.addEventListener('resize', () => {
  if(document.getElementById('screen1').classList.contains('active')) positionNoRandom();
});

/* ---------------- Calendar (screen 2) ---------------- */
const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
let calYear = 2026;
let calMonth = 6; // July (0-indexed)
let selectedDay = null;
let selectedTime = null;

function renderCalendar(){
  document.getElementById('calTitle').textContent = monthNames[calMonth] + ' ' + calYear;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'dow';
    el.textContent = d;
    grid.appendChild(el);
  });
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  for(let i=0;i<firstDay;i++){
    const el = document.createElement('div');
    el.className = 'day empty';
    grid.appendChild(el);
  }
  for(let d=1; d<=daysInMonth; d++){
    const el = document.createElement('div');
    el.className = 'day';
    el.textContent = d;
    if(selectedDay === d) el.classList.add('selected');
    el.onclick = () => {
      selectedDay = d;
      renderCalendar();
      checkReady();
    };
    grid.appendChild(el);
  }
}

function changeMonth(delta){
  calMonth += delta;
  if(calMonth > 11){ calMonth = 0; calYear++; }
  if(calMonth < 0){ calMonth = 11; calYear--; }
  selectedDay = null;
  renderCalendar();
  checkReady();
}

const times = ["12:00 PM","1:00 PM","2:00 PM","3:00 PM","4:00 PM","5:00 PM","6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM","8:30 PM"];
function renderTimes(){
  const grid = document.getElementById('timeGrid');
  grid.innerHTML = '';
  times.forEach(t => {
    const el = document.createElement('div');
    el.className = 'time-pill';
    el.textContent = t;
    if(selectedTime === t) el.classList.add('selected');
    el.onclick = () => {
      selectedTime = t;
      renderTimes();
      checkReady();
    };
    grid.appendChild(el);
  });
}

function checkReady(){
  const btn = document.getElementById('setDateBtn');
  if(selectedDay && selectedTime){ btn.classList.add('ready'); }
  else{ btn.classList.remove('ready'); }
}

renderCalendar();
renderTimes();

/* ---------------- Food (screen 3) ---------------- */
const foods = [
  {emoji:'🍕', label:'Pizza'},
  {emoji:'🍣', label:'Sushi'},
  {emoji:'🍔', label:'Burgers'},
  {emoji:'🍝', label:'Pasta'},
  {emoji:'🌮', label:'Tacos'},
  {emoji:'🍜', label:'Ramen'}
];
let selectedFood = null;
function renderFood(){
  const grid = document.getElementById('foodGrid');
  grid.innerHTML = '';
  foods.forEach(f => {
    const el = document.createElement('div');
    el.className = 'food-card';
    if(selectedFood === f.label) el.classList.add('selected');
    el.innerHTML = `<span class="emoji">${f.emoji}</span><span class="label">${f.label}</span>`;
    el.onclick = () => {
      selectedFood = f.label;
      renderFood();
      document.getElementById('nextBtn').classList.add('ready');
    };
    grid.appendChild(el);
  });
}
renderFood();

/* ---------------- Finalize (screen 4) ---------------- */
function finalize(){
  if(!selectedFood) return;
  const dateStr = monthNames[calMonth].slice(0,3) + ' ' + selectedDay + ', ' + calYear;
  document.getElementById('sumDate').textContent = dateStr;
  document.getElementById('sumTime').textContent = selectedTime;
  document.getElementById('sumFood').textContent = selectedFood;
  goTo(4);
}
</script>
</body>
</html>
